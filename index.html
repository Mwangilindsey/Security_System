<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jonathan Gloag Academy Security System</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: #fff;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    background: #1e293b;
    padding: 25px;
    border-radius: 12px;
    width: 350px;
    text-align: center;
    box-shadow: 0 0 20px rgba(0,0,0,0.5);
}

input, select, button {
    width: 95%;
    padding: 10px;
    margin: 8px 0;
    border-radius: 6px;
    border: none;
}

button {
    background: #22c55e;
    color: white;
    font-weight: bold;
    cursor: pointer;
}

button:hover {
    background: #16a34a;
}

.hidden { display: none; }

.status {
    margin-top: 10px;
    font-weight: bold;
}

.log {
    text-align: left;
    margin-top: 15px;
    max-height: 150px;
    overflow-y: auto;
    background: #020617;
    padding: 10px;
    border-radius: 8px;
    font-size: 12px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="container" id="loginBox">
    <h2>Security Login</h2>
    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <p id="loginMsg"></p>
</div>

<!-- DASHBOARD -->
<div class="container hidden" id="dashboard">
    <h2>Access Control System</h2>
    <p id="welcome"></p>

    <input type="text" id="name" placeholder="Full Name">

    <select id="category">
        <option value="Student">Student</option>
        <option value="Visitor">Visitor</option>
        <option value="Staff">Staff</option>
    </select>

    <input type="text" id="idNumber" placeholder="ID / Registration Number">

    <button onclick="recordEntry()">Record Entry</button>
    <button onclick="recordExit()">Record Exit</button>
    <button onclick="logout()">Logout</button>

    <div class="log" id="logBox">
        <strong>Activity Log:</strong><br>
    </div>
</div>

<script>
let attempts = 0;
const MAX_ATTEMPTS = 3;

// TIME FUNCTION
function getTime() {
    return new Date().toLocaleTimeString();
}

// LOGGING FUNCTION
function logEvent(message) {
    const logBox = document.getElementById("logBox");
    logBox.innerHTML += `[${getTime()}] ${message}<br>`;
    logBox.scrollTop = logBox.scrollHeight;
}

// LOGIN
function login() {
    const user = document.getElementById("username").value;
    const pass = document.getElementById("password").value;

    if (attempts >= MAX_ATTEMPTS) {
        document.getElementById("loginMsg").innerText = "System Locked!";
        return;
    }

    if (user === "admin" && pass === "1234") {
        document.getElementById("loginBox").classList.add("hidden");
        document.getElementById("dashboard").classList.remove("hidden");
        document.getElementById("welcome").innerText = "Welcome, " + user;
        logEvent("User logged in");
        attempts = 0;
    } else {
        attempts++;
        document.getElementById("loginMsg").innerText = "Invalid credentials!";
        logEvent("Failed login attempt");

        if (attempts >= MAX_ATTEMPTS) {
            logEvent("SYSTEM LOCKED due to multiple failed attempts");
        }
    }
}

// RECORD ENTRY
async function recordEntry() {
    const full_name = document.getElementById("name").value;
    const category = document.getElementById("category").value;
    const id_number = document.getElementById("idNumber").value;

    if (!full_name || !id_number) {
        alert("Please fill all fields");
        return;
    }

    try {
        const res = await fetch("http://localhost:3000/entry", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ full_name, category, id_number })
        });

        const msg = await res.text();
        logEvent(full_name + " ENTERED (" + category + ")");
        alert(msg);
    } catch (err) {
        alert("Server error");
    }
}

// RECORD EXIT
async function recordExit() {
    const id_number = document.getElementById("idNumber").value;

    if (!id_number) {
        alert("Enter ID number");
        return;
    }

    try {
        const res = await fetch("http://localhost:3000/exit", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ id_number })
        });

        const msg = await res.text();
        logEvent("ID " + id_number + " EXITED");
        alert(msg);
    } catch (err) {
        alert("Server error");
    }
}

// LOGOUT
function logout() {
    document.getElementById("dashboard").classList.add("hidden");
    document.getElementById("loginBox").classList.remove("hidden");
    logEvent("User logged out");
}
</script>

</body>
</html>
